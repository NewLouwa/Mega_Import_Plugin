name: MEGA Import
description: Browse a MEGA.nz account inside Stash, import files (with size-aware timeouts, per-folder cache, real-byte progress), auto-tag & identify on the way in.
version: 1.0.0
ui:
  javascript:
    - mega_import.js
  css:
    - mega_import.css
exec:
  - python
  - "{pluginDir}/mega_import.py"
interface: raw
tasks:
  # Single task — the JS bridge passes 'action' in args_map to dispatch.
  # Result is encoded into Job.error as 'OK:<json>' / 'ERR:<message>' because
  # Stash's GraphQL doesn't expose plugin task stdout. See mega_import.py docstring.
  - name: MEGA Operation
    description: Generic MEGA backend operation (login, list, download, etc.)
    defaultArgs:
      action: ""
